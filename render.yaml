services:
  - type: web
    name: stockai-pro
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn stockai.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: stockai-db
          property: connectionString

databases:
  - name: stockai-db
    plan: free